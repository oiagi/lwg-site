<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GwG</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #ffffff;
      --bg-active: #d6eaf8;
      --transition-speed: 0.6s;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: background-color var(--transition-speed) ease;
      font-family: sans-serif;
    }

    body.active {
      background-color: var(--bg-active);
    }

    .logo-container {
      position: relative;
      width: min(80vw, 700px);
      cursor: pointer;
      user-select: none;
    }

    .logo-container img {
      width: 100%;
      height: auto;
      display: block;
      /* Invert the image: black bg + white outlines → white bg + black outlines */
      filter: invert(1);
      transition: filter var(--transition-speed) ease;
    }

    body.active .logo-container img {
      /* Keep logo visible on light blue: invert gives black lines, which still look great */
      filter: invert(1);
    }

    /* Invisible clickable overlay sized to roughly cover the cloud shape */
    .cloud-hitbox {
      position: absolute;
      top: 10%;
      left: 20%;
      width: 65%;
      height: 55%;
      border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
      cursor: pointer;
      /* Uncomment below to debug the hitbox: */
      /* background: rgba(255,0,0,0.2); */
    }

    /* Subtle ripple on click */
    .ripple {
      position: fixed;
      border-radius: 50%;
      transform: scale(0);
      background: rgba(100, 180, 230, 0.35);
      animation: ripple-anim 0.7s linear;
      pointer-events: none;
    }

    @keyframes ripple-anim {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="logo-container" id="logoContainer">
    <img src="GwG_logo_v1_0.png" alt="GwG Logo" id="logo" />
    <div class="cloud-hitbox" id="cloudHitbox"></div>
  </div>

  <script>
    const body = document.body;
    const hitbox = document.getElementById('cloudHitbox');
    const logoContainer = document.getElementById('logoContainer');

    function triggerRipple(x, y) {
      const ripple = document.createElement('div');
      ripple.classList.add('ripple');
      const size = Math.max(window.innerWidth, window.innerHeight) * 2;
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (x - size / 2) + 'px';
      ripple.style.top = (y - size / 2) + 'px';
      document.body.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    }

    function handleClick(e) {
      body.classList.toggle('active');
      triggerRipple(e.clientX, e.clientY);
    }

    // Click on the cloud hitbox OR anywhere on the logo container toggles the bg
    hitbox.addEventListener('click', handleClick);
    // Also allow clicking directly on the logo image (cloud area)
    logoContainer.addEventListener('click', handleClick);
  </script>

</body>
</html>
